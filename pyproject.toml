[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "biosieve"
version = "0.1.0"
description = "Redundancy reduction and leakage-aware dataset partitioning for biological ML."
readme = "README.md"
requires-python = ">=3.9"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [
   { name = "KrenAI-Lab", email = "krenai@umag.cl" }
]
dependencies = [
  "numpy>=1.23",
  "pandas>=1.5",
  "scikit-learn>=1.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "pre-commit>=3.5",
  "ruff>=0.4.0",
]
# Optional backends (kept separate on purpose)
minhash = ["datasketch>=1.6"]
faiss = ["faiss-cpu>=1.7.4; platform_system != 'Darwin'"]

[project.scripts]
biosieve = "biosieve.cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
